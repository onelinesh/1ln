name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#cli-}"
          mkdir -p out
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/onelinesh/1ln/cli/cmd.Version=$VERSION" \
            -o out/1ln .
          tar -czvf "out/1ln-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" -C out 1ln
          rm out/1ln

      - uses: actions/upload-artifact@v4
        with:
          name: 1ln-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/out/1ln-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: shasum -a 256 *.tar.gz | tee SHA256SUMS

      - name: release
        working-directory: dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "1ln CLI ${GITHUB_REF_NAME#cli-}. Install: \`curl 1ln.sh/install | sh\`." \
            *.tar.gz SHA256SUMS
